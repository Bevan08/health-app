<!DOCTYPE html>
<html>

<head>
<title>Patient Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">

<style>
/* CENTER THE PAGE */
body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background: linear-gradient(to right, #c3e7f5, #83e4f5);
}

/* LOGIN BOX */
.login-box{
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 8px 25px rgba(0,0,0,0.1);
    width:350px;
    max-width:90%;
    text-align:center;
}

/* INPUTS */
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:14px;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#2d89ef;
    color:white;
    font-size:15px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1b5fa7;
}

/* ERROR */
.error-msg{
    color:red;
    font-size:14px;
}

/* MOBILE */
@media (max-width: 600px){

    .login-box{
        padding:20px;
    }

    h2{
        font-size:20px;
    }
}
</style>

</head>

<body>

<div class="login-box">

<h2>Patient Login</h2>

{% if error %}
<p class="error-msg">{{ error }}</p>
{% endif %}

<form action="/" method="post">

<input type="text" name="username" placeholder="Enter Name" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
